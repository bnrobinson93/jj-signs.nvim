name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.0

      - name: Install jj
        run: |
          JJ_VERSION=0.28.0
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /usr/local/bin jj
          jj --version

      - name: Install plenary.nvim
        run: |
          git clone --depth=1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/lazy/plenary.nvim

      - name: Run tests
        run: |
          nvim --headless \
            -u test/minimal_init.lua \
            -c "PlenaryBustedDirectory test/ {minimal_init = 'test/minimal_init.lua'}" \
            +q

  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ --globals vim describe it before_each assert
